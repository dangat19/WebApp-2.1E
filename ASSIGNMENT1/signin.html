<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    nav {
      background-color: #333;
      overflow: hidden;
    }
    nav a {
      float: left;
      display: block;
      color: white;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 14px;
    }
    nav a:hover { background-color: #555; }
    nav a.active { background-color: #4CAF50; }

    .page-header {
      background-color: #1a1a2e;
      color: white;
      padding: 30px 40px;
    }
    .page-header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .card {
      background-color: white;
      max-width: 420px;
      margin: 50px auto;
      padding: 2rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .card h2 {
      color: #1a1a2e;
      margin: 0 0 5px;
      font-size: 22px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin: 0 0 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      font-weight: bold;
      color: #374151;
      margin-bottom: 5px;
    }

    input[type="email"],
    input[type="password"] {
      padding: 9px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #111827;
      font-family: Arial, sans-serif;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #4f46e5;
    }

    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }
    .forgot a {
      font-size: 12px;
      color: #4f46e5;
      text-decoration: none;
    }
    .forgot a:hover { text-decoration: underline; }

    input[type="submit"] {
      width: 100%;
      padding: 11px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    input[type="submit"]:hover { background-color: #4338ca; }

    .divider {
      text-align: center;
      margin: 1.2rem 0;
      font-size: 13px;
      color: #9ca3af;
      position: relative;
    }
    .divider::before,
    .divider::after {
      content: '';
      display: inline-block;
      width: 38%;
      height: 1px;
      background: #e5e7eb;
      vertical-align: middle;
      margin: 0 8px;
    }

    .signup-link {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 1rem;
    }
    .signup-link a {
      color: #4f46e5;
      font-weight: bold;
      text-decoration: none;
    }
    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="index2.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html">Contact Us</a>
    <a href="signin.html" class="active">Sign In</a>
    <a href="signup.html">Sign Up</a>
  </nav>


  <div class="page-header">
    <h1>SIGN IN</h1>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your account to continue.</p>

    <form action="#" method="post">

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="e.g. jane@example.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
      </div>

      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>

      <input type="submit" value="Sign in">

    </form>

    <div class="divider">or</div>

    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>

  </div>

</body>
</html>
