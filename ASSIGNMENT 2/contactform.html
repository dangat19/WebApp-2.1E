<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
  <style>
    /* Page background */
    body {
      margin: 0;
      padding: 40px 20px;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    /* Form card */
    .form-container {
      background-color: white;
      max-width: 480px;
      margin: 0 auto;
      padding: 2rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
    }

    /* Heading */
    h2 {
      color: #1a1a2e;
      margin: 0 0 5px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 14px;
      margin: 0 0 1.5rem;
    }

    /* Each field group */
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }

    /* Labels */
    label {
      font-size: 13px;
      font-weight: bold;
      color: #374151;
      margin-bottom: 5px;
    }

    /* Inputs and textarea */
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea {
      padding: 9px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      color: #111827;
      font-family: Arial, sans-serif;
      outline: none;
    }

    /* Focus effect - highlight border when clicked */
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    textarea:focus {
      border-color: #4f46e5;
    }

    textarea {
      resize: vertical;
    }

    /* Submit button */
    input[type="submit"] {
      width: 100%;
      padding: 11px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    input[type="submit"]:hover {
      background-color: #4338ca;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Contact Us</h2>
    <p class="subtitle">We'll get back to you as soon as possible.</p>

    <form action="#" method="post">

      <div class="form-group">
        <label for="fullname">Full name</label>
        <input type="text" id="fullname" name="fullname" placeholder="e.g. Jane Doe">
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="e.g. jane@example.com">
      </div>

      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="e.g. +254 700 000000">
      </div>

      <div class="form-group">
        <label for="subject">Subject line</label>
        <input type="text" id="subject" name="subject" placeholder="What's this about?">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Write your message here..."></textarea>
      </div>

      <input type="submit" value="Send message">

    </form>
  </div>

</body>
</html>
